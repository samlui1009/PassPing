name: Build PassPing Extension
on:
    workflow_dispatch: 
    push:
        branches: ["main"]
        tags:
            - v*.*.*
    pull_request:
        branches: ["main"]
jobs:
  build-extension:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./passping-extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: 22
            cache-dependency-path: ./passping-extension/package-lock.json
            cache: 'npm'

      # npm CLEAN install: For automation and ensuring reproducible builds. 
      # Dependencies installed as per dependency tree in package-lock.json.
      - name: Install required dependencies
        run: npm ci
         
      - name: Build ZIP file for extension 
        run: npm run build:zip --if-present

      - name: Create ZIP file
        run: |
            cd build 
            zip -r ../passping-ext-build.zip ./*
    
      - name:  Upload ZIP file as artifact 
        uses: actions/upload-artifact@v4
        with:
            name: passping-extension-build
            path: passping-extension/passping-ext-build.zip
            retention-days: 1
    
